6",titre:"Notifications \xE9largies",points:["La fen\xEAtre Notifications affiche maintenant 5 lignes.","Le reste de l'interface s'est l\xE9g\xE8rement resserr\xE9 pour compenser \u2014 toujours z\xE9ro d\xE9filement, ni sur la page ni sur les jauges."]},{v:"0.5.8",date:"7 juillet 2026",titre:"Notifications \xE0 leur taille",points:["La fen\xEAtre Notifications colle enfin \xE0 son contenu : la liste remplit toute la bo\xEEte, sans grand vide en dessous.","L'espace r\xE9cup\xE9r\xE9 remonte aux jauges m\xE9ta : les 7 jauges tiennent sans d\xE9filement."]},{v:"0.5.7",date:"7 juillet 2026",titre:"Le scroll est mort, pour de bon",points:["La page est d\xE9sormais verrouill\xE9e \xE0 la taille de l'\xE9cran : il est structurellement impossible qu'elle d\xE9file.","Si un onglet a vraiment trop de contenu (gros inventaire\u2026), c'est sa fen\xEAtre int\xE9rieure qui d\xE9file discr\xE8tement, comme dans tout jeu.","En-t\xEAte compact\xE9 et barres l\xE9g\xE8rement affin\xE9es pour que la Boutique tienne sans d\xE9filer du tout."]},{v:"0.5.6",date:"7 juillet 2026",titre:"Contours, cadrage & meilleur \xE9quipement",points:["Tous les textes ont maintenant un contour noir de 1px, fa\xE7on jeu vid\xE9o \u2014 lisibles sur n'importe quel fond.","La sc\xE8ne de combat est recadr\xE9e : h\xE9ros et monstres tiennent enti\xE8rement dans le cadre.","Interface resserr\xE9e : tout tient \xE0 l'\xE9cran sans d\xE9filement.","Nouveau bouton \xAB \u26A1 \xC9quiper le meilleur \xBB (onglet \xC9quipement) : calcule la valeur de chaque objet et \xE9quipe automatiquement la meilleure combinaison, slots jumeaux compris."]},{v:"0.5.5",date:"7 juillet 2026",titre:"Une police qui se lit, enfin",points:["Les textes et les chiffres passent sur une police nette et moderne (Jost) \u2014 la pr\xE9c\xE9dente \xE9tait \xE9l\xE9gante mais illisible sur fond sombre. Les titres gardent leur style FF13.","Les chiffres sur les barres ont maintenant un contour sombre : lisibles quel que soit le remplissage."]},{v:"0.5.4",date:"7 juillet 2026",titre:"Jauges XXL",points:["Les jauges m\xE9ta sont deux fois plus hautes, les chiffres dessus enfin lisibles, et la fen\xEAtre est bien remplie.","Toutes les \xE9critures passent en blanc et en gras \u2014 termin\xE9 le texte fant\xF4me p\xE9nible \xE0 lire."]},{v:"0.5.3",date:"6 juillet 2026",titre:"Alignements au cordeau",points:["Journal de combat et Commandes intervertis : les 4 boutons en colonne \xE0 c\xF4t\xE9 des stats, le journal en pleine largeur en dessous \u2014 et son bas s'aligne avec la fen\xEAtre de gauche.","Plus de trou \xE0 droite : les fen\xEAtres se partagent toute la largeur de l'\xE9cran.","Notifications compact\xE9es : tout tient \xE0 l'\xE9cran, sans d\xE9filement.","Tokens : chiffre et libell\xE9 agrandis, ic\xF4ne align\xE9e."]},{v:"0.5.2",date:"6 juillet 2026",titre:"Fen\xEAtre de notifications & finitions",points:["Les notifications ne flottent plus au milieu de l'\xE9cran : elles ont leur fen\xEAtre d\xE9di\xE9e en bas, sur toute la largeur, avec historique.","Statistiques de combat et Journal de combat : m\xEAme hauteur, plus larges ; la fen\xEAtre Commandes s'\xE9tend sous les deux.","Textes en blanc pur \u2014 le contraste ne pique plus les yeux.","Le compteur de tokens en attente (+x) est enfin lisible."]},{v:"0.5.1",date:"6 juillet 2026",titre:"Lisibilit\xE9 & agencement peaufin\xE9s",points:["Textes nettement plus grands et plus contrast\xE9s \u2014 fini de plisser les yeux.","Plus aucun d\xE9bordement : le jeu tient dans l'\xE9cran, sans barre de d\xE9filement.","Les onglets s'\xE9tendent sur toute la largeur ; statistiques et journal passent juste en dessous.","Nouvelle fen\xEAtre Commandes en bas \xE0 droite : AFK, ZONE, RESET RUN et Param\xE8tres.","Barre du haut r\xE9organis\xE9e : tokens de boss \xE0 gauche, zone au centre, or \xE0 droite \u2014 en plus gros."]},{v:"0.5.0",date:"6 juillet 2026",titre:"Grand \xE9cran & armes de Transcendance",points:["Le jeu occupe enfin tout l'\xE9cran : statistiques de combat et journal de combat ont leurs propres fen\xEAtres, \xE0 droite.","Nouvelle direction artistique des textes \u2014 polices \xE9l\xE9gantes fa\xE7on FF13.","Vente d'\xE9quipement par raret\xE9 (un bouton par raret\xE9, avec compteur).","Recyclage automatique du butin, param\xE9trable par raret\xE9, par type et par niveau \u2014 fini le tri \xE0 la main.","Anneaux et boucles d'oreille : tu choisis maintenant dans quel emplacement les \xE9quiper. Les armes secondaires s'appellent des Lames, et chaque objet affiche son type.","Les Armes de Transcendance ne se ramassent plus : elles se forgent en transcendant une zone. For\xEAt = or, D\xE9sert = attaque, Oc\xE9an = PV. Uniques, indestructibles, elles se renforcent \xE0 chaque transcendance \u2014 la meilleure s'\xE9quipe toute seule, et tu peux choisir la tienne."]},{v:"0.4.1",date:"6 juillet 2026",titre:"La mise \xE0 jour vient \xE0 toi",points:["Au lancement, l'application v\xE9rifie toute seule si une nouvelle version existe et te propose de l'installer \u2014 tu peux toujours refuser et le faire plus tard."]},{v:"0.4.0",date:"6 juillet 2026",titre:"Le jeu apprend \xE0 se mettre \xE0 jour",points:["Le jeu a maintenant un num\xE9ro de version, visible dans les R\xE9glages.","Cette fen\xEAtre de nouveaut\xE9s s'affiche apr\xE8s chaque mise \xE0 jour \u2014 tu ne rateras plus rien.","Dans l'application de bureau, le bouton \xAB Mettre \xE0 jour le jeu \xBB (R\xE9glages) r\xE9cup\xE8re la derni\xE8re version en ligne."]},{v:"0.3.0",date:"juin 2026",titre:"La base du monde",points:["3 zones \xD7 10 niveaux : For\xEAt, D\xE9sert, Oc\xE9an, chacune gard\xE9e par son Gardien.","Bestiaire, stances, \xE9quipement persistant et jauges de transcendance."]}];function Ns(e,n){let t=String(e||"0").split("."),r=String(n||"0").split(".");for(let o=0;o<3;o++){let l=(parseInt(t[o],10)||0)-(parseInt(r[o],10)||0);if(l)return l}return 0}var j={hero:{atk:10,hp:100,as:1,critC:5,critD:150},mob:{hp:30,hpG:1.36,atk:3.2, .trx{ --bg:#161b2e; --panel:#1f2540; --panel2:#262d4d; --line:#3a4270; --txt:#ffffff; --dim:#ccd6f4; --leaf:#7ee06e; --gold:#ffd45e; --cyan:#6ad4ff; --violet:#c59bff; --rouge:#ff6b6b;

.note{ font-size:11px; color:var(--dim); background:rgba(0,0,0,.22); border-left:3px solid var(--line); border-radius:4px; padding:7px 9px; margin:0 0 10px; }

.dim{ color:var(--dim); }

.note{ background:rgba(0,0,0,.34); color:#f0f3ff; margin:0 0 6px; padding:5px 9px; }
.schip{ color:#f0f3ff; }
.invstats,.slotvide{ color:#dbe2fa; }
.jauge{ margin-bottom:8px; }
.panneau{ padding:8px 12px; }
.tabbtn{ padding:7px 4px; }
.topbar{ padding:6px 12px; }
.toast{ padding:4px 9px; font-size:14px; }
.entete{ display:flex; align-items:baseline; justify-content:center; gap:12px; flex:0 0 auto; }
.titre{ font-size:16px; letter-spacing:5px; margin:0; }
.stitre{ font-size:8px; letter-spacing:2px; }
.carte{ padding:8px; gap:3px; }
.topbar,.scene,.tabsbar{ flex:0 0 auto; }
.colonnes{ display:grid; grid-template-columns:minmax(0,1.1fr) minmax(380px,0.9fr); gap:8px; align-items:stretch; flex:1; min-height:0; }
.colG{ display:flex; flex-direction:column; gap:8px; min-width:0; min-height:0; }
.colG .panneau{ flex:1; min-height:0; overflow-y:auto; }
.trx ::-webkit-scrollbar{ width:9px; height:9px; }
.trx ::-webkit-scrollbar-track{ background:transparent; }
.trx ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:5px; }
.trx ::-webkit-scrollbar-thumb:hover{ background:#4d568a; }
.zoneDroite{ display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto minmax(0,1fr); gap:8px; align-items:stretch; }
.pcote{ min-height:0; }
.pstats{ display:flex; flex-direction:column; overflow-y:auto; }
.zoneDroite .chips{ flex-wrap:wrap; overflow:visible; }
.pcmd .cmdcol{ display:flex; flex-direction:column; gap:8px; }
.pjournal{ grid-column:1 / -1; display:flex; flex-direction:column; min-height:120px; overflow:hidden; }
.pnotifs{ width:100%; flex:0 0 188px; min-height:0; display:flex; flex-direction:column; }
.notiflist{ display:flex; flex-direction:column; gap:4px; flex:1; min-height:0; overflow-y:auto; }
.zoneDroite{ min-height:0; }
.pstats{ min-height:0; }
.ctitel{ font-size:14px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:9px; }
.statcol{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.statcol .schip{ display:flex; justify-content:space-between; align-items:baseline; }
.colM .chips{ flex-wrap:wrap; overflow:visible; }
.loglist{ display:flex; flex-direction:column; gap:4px; font-size:15px; flex:1; min-height:0; overflow-y:auto; }
.loglist div{ text-shadow:1px 1px 0 #000; }
.cmdcol .btn{ width:100%; text-align:center; padding:10px; }
.topbar{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; }
.tbcentre{ display:flex; gap:14px; align-items:center; justify-content:center; flex-wrap:wrap; }
.tbside{ font-size:22px; font-weight:700; display:flex; align-items:center; gap:7px; }
.tbside .pend{ font-size:18px; margin-left:0; }
.tbdim{ font-size:16px; color:var(--dim); font-weight:500; }
.tbdroite{ justify-content:flex-end; }
.slottag{ font-size:11px; text-transform:uppercase; letter-spacing:.5px; border:1px solid var(--line); border-radius:4px; padding:1px 6px; font-family:'Cinzel', Georgia, serif; }
.vendrow{ display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.togline{ display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.numin{ width:76px; background:#12162a; border:2px solid var(--line); border-radius:6px; color:var(--txt); padding:3px 6px; font-family:inherit; font-size:15px; }
@media (max-width:1560px){ .zoneDroite{ grid-template-columns:280px 330px; } }

.panneau{ border-radius:16px; background:rgba(26,29,50,.92); }
.carte{ border-radius:14px; } .btn{ border-radius:10px; } .topbar{ border-radius:14px; background:rgba(26,29,50,.92); }
.scene{ border-radius:18px; border-color:#4a5178; }
.plate{ border-radius:12px; background:rgba(10,12,24,.74); }
.fond{ position:absolute; inset:0; width:100%; height:100%; }

.vsband .g{ flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.vsm{ flex:0 0 42px; text-align:center; opacity:.85; font-size:9px; }
.logbox{ background:rgba(14,16,30,.88); border:2px solid var(--line); border-radius:14px; padding:8px 12px; font-size:11px; display:flex; flex-direction:column; gap:3px; min-height:74px; justify-content:flex-end; }
.logbox div{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:1px 1px 0 #000; }
.float.heal{ color:#7ef29a; }
.combattant{ padding-bottom:28px; }
.rabchip{ color:#79d0c3; }
.modale{ border-radius:16px; background:rgba(26,29,50,.97); }

.zarrow:disabled{ opacity:.3; cursor:default; }
.btn.mini{ padding:4px 7px; font-size:10px; text-transform:none; }
