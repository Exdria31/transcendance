tification importante attend.","\u{1F3AF} Objectifs proches : la colonne droite te sugg\xE8re en permanence 3-4 prochaines \xE9tapes pertinentes (Gardien \xE0 vaincre, ma\xEEtrise restante, node achetable, \xC9cho \xE0 \xE9quiper\u2026).","Bestiaire : le monstre s\xE9lectionn\xE9 a maintenant son panneau de d\xE9tail dans la colonne droite, avec barre de progression et conseil.","Loot plus satisfaisant : le nouvel objet clignote dor\xE9 dans l'inventaire, un \u25B2 vert signale les am\xE9liorations potentielles, badge de raret\xE9 sur la fiche.","Th\xE9\xE2tre de combat : l'\xE9tat pulse quand le boss approche, la sc\xE8ne s'embrase face \xE0 un Gardien, les d\xE9g\xE2ts flottants s'\xE9talent mieux.","Arbre d'Origine : clique le titre d'une branche pour la mettre en focus (les autres s'estompent), les nodes achet\xE9s prennent la couleur de leur branche, connecteurs vers le tronc.","Renaissance : le gain d'\xC9clats s'affiche en tr\xE8s grand, fa\xE7on rituel.","Info-bulles sur toutes les ressources du bandeau et les stats cl\xE9s \u2014 survole pour comprendre d'o\xF9 \xE7a vient et \xE0 quoi \xE7a sert."]},{v:"0.9.2",date:"8 juillet 2026",titre:"Confort, \xE9chelle & composition",points:["Toute l'interface gagne en \xE9chelle : textes, boutons, cartes et valeurs importantes sont plus grands et hi\xE9rarchis\xE9s \u2014 fini de plisser les yeux.","Chaque \xE9cran a son titre et son sous-titre ; la colonne droite devient contextuelle : elle affiche des infos utiles selon l'onglet (jauges proches du palier, stance active, progression de zone, \xE9tat d'Origine\u2026).","Les notifications quittent le bas de l'\xE9cran : un bouton \u{1F514} discret ouvre leur tiroir, et les \xE9v\xE9nements importants apparaissent en toasts \xE9ph\xE9m\xE8res en haut \xE0 droite. Journal : 3 modes (Important / Tout / R\xE9duit).","Th\xE9\xE2tre de combat recompos\xE9 : \xE9tat au centre avec compteur avant le boss, badges lisibles.","\xC9quipement plus RPG : personnage et slots agrandis, inventaire \xE0 plus grosses cases, et un vrai r\xE9sum\xE9 (puissance, raret\xE9s, slots vides, ressources) quand rien n'est s\xE9lectionn\xE9.","Arbre d'Origine : nodes compacts avec pastille de rang, clic pour s\xE9lectionner et panneau de d\xE9tail d\xE9di\xE9 avec bouton d'achat \u2014 fini les listes de courses.","Jauges m\xE9ta sur deux colonnes, zones alt\xE9r\xE9es \xE0 l'ambiance corrompue."]},{v:"0.9.1",date:"8 juillet 2026",titre:"Grande toilette de l'interface",points:["Design harmonis\xE9 partout : bordures fines, panneaux en profondeur, plus d'air, hi\xE9rarchie claire \u2014 fini l'effet \xAB outil de debug \xBB.","Sc\xE8ne de combat : badge du type d'ennemi (normal / mini-boss / Gardien), \xE9tat en direct (exploration, boss imminent, AFK, zone alt\xE9r\xE9e), critiques spectaculaires.","Journal de combat filtrable : par d\xE9faut, seuls les \xE9v\xE9nements importants s'affichent ; le spam de combat reste accessible via \xAB Tout \xBB. Notifications repliables.","Bestiaire enti\xE8rement repens\xE9 : cartes compactes scannables, filtres par zone / statut / type, d\xE9tail complet au clic \u2014 le lore ne g\xEAne plus la lecture.","Origine plus prestigieuse : bouton de Renaissance dor\xE9 et pulsant, toast quand elle devient disponible, arbre aux nodes \xE9pur\xE9s (d\xE9tail au survol), progression par branche, nodes majeurs mis en valeur.","Serments : badge de risque (faible \u2192 extr\xEAme) et dur\xE9e clarifi\xE9e. Zones alt\xE9r\xE9es : badge d\xE9di\xE9.","Les raret\xE9s L\xE9gendaire, Mythique et Divin rayonnent d'un halo lumineux sur l'\xE9quipement et les \xC9chos.","Stances : grande carte de la stance active avec tous ses effets ; chaque stance affiche sa couleur d'identit\xE9.","Correction : la Vitalit\xE9 affiche d\xE9sormais le vrai pourcentage de soin (30%)."]},{v:"0.9.0",date:"8 juillet 2026",titre:"L'Origine \u2014 le monde s'agrandit",points:["Le continent passe \xE0 15 zones : Montagne, Plaines Orageuses, Glacier, Volcan, Marais Putride, Ruines Anciennes, Citadelle Astrale, Jungle Primordiale, Abysses, D\xE9sert de Verre, Ciel Fragment\xE9 et le C\u0153ur du Monde \u2014 chacune avec ses 11 cr\xE9atures, son Gardien et son arme de Transcendance.","Attention : \xE0 partir de la zone 5, le monde devient brutal. C'est voulu.","\u2600 La Renaissance : le nouveau reset global, au-dessus de la Transcendance. D\xE8s la zone 4, l'onglet Origine appara\xEEt ; d\xE8s la zone 5, tu peux dissoudre ton cycle entier contre des \u2756 \xC9clats d'Origine, permanents.","\u{1F333} L'Arbre d'Origine : 5 branches (Corps, \xC2me, M\xE9moire, H\xE9ritage, Destin), 150 nodes de bonus permanents \xE0 acheter avec tes \xC9clats.","\u{1F300} Les \xC9chos : des reliques permanentes \xE0 choisir apr\xE8s chaque Renaissance \u2014 7 types, 8 raret\xE9s, slots limit\xE9s. La branche Destin am\xE9liore leurs raret\xE9s, niveaux et choix.","\u{1F56F} Les Serments : 8 d\xE9fis optionnels qui durcissent le cycle contre plus d'\xC9clats et de meilleurs \xC9chos (d\xE9bloqu\xE9s via Destin).","\u{1F317} Les Zones alt\xE9r\xE9es : des variantes plus dangereuses et plus rentables des zones 1 \xE0 5 (apr\xE8s ta premi\xE8re Renaissance).","Tes anciennes sauvegardes fonctionnent telles quelles. L'\xE9quilibrage s'affinera dans les prochaines versions."]},{v:"0.8.5",date:"7 juillet 2026",titre:"Pi\xE8ces sonnantes & historique",points:["La bourse affiche de vraies pi\xE8ces color\xE9es : Cuivre, Argent, Or, Platine, \xC9meraude, Rubis, Saphir, Diamant \u2014 chacune vaut 100 fois la pr\xE9c\xE9dente.","Historique des mises \xE0 jour consultable dans Param\xE8tres : tout le changelog depuis le d\xE9but du jeu.","Les stances rejoignent la fen\xEAtre Commandes ; le Journal de combat retrouve de la hauteur."]},{v:"0.8.4",date:"7 juillet 2026",titre:"Fen\xEAtres align\xE9es",points:["Dans l'onglet \xC9quipement, toutes les fen\xEAtres prennent la hauteur de la plus grande, et leur conteneur s'y ajuste exactement."]},{v:"0.8.3",date:"7 juillet 2026",titre:"Cadres ajust\xE9s & stance affich\xE9e",points:["Les cadres de l'onglet \xC9quipement \xE9pousent leur contenu \u2014 fini les grandes zones vides en bas.","La stance active et son niveau s'affichent sous le personnage, dans un cadre central \xE9largi."]},{v:"0.8.2",date:"7 juillet 2026",titre:"Boutons du vestiaire lisibles",points:["Les quatre boutons de l'onglet \xC9quipement affichent leur nom complet : Ensemble \xC9quipement, Priorit\xE9s \xC9quipement, Recyclage Automatique, Arme Transcendance.","Le personnage et ses compartiments remontent juste sous le titre, et l'inventaire c\xE8de la largeur n\xE9cessaire aux boutons."]},{v:"0.8.1",date:"7 juillet 2026",titre:"Le vestiaire prend ses aises",points:["L'onglet \xC9quipement est r\xE9agenc\xE9 en trois panneaux : d\xE9tails de la pi\xE8ce s\xE9lectionn\xE9e \xE0 gauche, personnage au centre, inventaire \xE0 droite \u2014 plus d'espace perdu.","Quatre boutons \xE0 droite ouvrent leurs fen\xEAtres d\xE9di\xE9es : Ensembles (E E), Priorit\xE9s (PE), Recyclage auto (RA) et Armes de Transcendance (AT).","Les statistiques de combat sont cat\xE9goris\xE9es : Offensives, D\xE9fensives, Bonus, Divers \u2014 avec deux nouvelles lignes (d\xE9g\xE2ts boss, remplissage des jauges).","Les stances ne s'affichent plus dans l'onglet \xC9quipement."]},{v:"0.8.0",date:"7 juillet 2026",titre:"Le grand vestiaire",points:["L'onglet \xC9quipement occupe d\xE9sormais toute la largeur : journal, commandes et notifications s'effacent pour te laisser g\xE9rer ton stuff (les stats de combat restent \xE0 droite).","Nouveau visuel d'\xE9quipement en compartiments autour de ton h\xE9ros \u2014 survole pour les d\xE9tails, clique pour affiner, clic droit pour verrouiller.","Vrai inventaire \xE0 cases : chaque objet dans sa case color\xE9e par raret\xE9, badges de tier et de verrou, survol pour les stats.","Tri automatique (raret\xE9 puis tier puis niveau) et filtres par type d'\xE9quipement (armes, anneaux, boucles\u2026).","Ensembles d'\xE9quipement : sauvegarde ta panoplie actuelle, r\xE9\xE9quipe-la en un clic, renomme-la, range-la dans des groupes. Les pi\xE8ces li\xE9es \xE0 un ensemble sont automatiquement \u{1F517} verrouill\xE9es.","\xAB \xC9quiper le meilleur \xBB configurable : construis ton ordre de priorit\xE9 (Or \u2192 Attaque \u2192 PV\u2026), et sauvegarde-le en profils r\xE9utilisables."]},{v:"0.7.1",date:"7 juillet 2026",titre:"Finitions de forge",points:["L'essence r\xE9siduelle brille d\xE9sormais en rouge rubis, et son nom complet s'affiche dans le bandeau.","Les ressources du bandeau sont encadr\xE9es d'un liser\xE9 dor\xE9 \u2014 chaque monnaie a son \xE9crin.","Clic droit sur un objet (inventaire ou \xE9quip\xE9) pour le \u{1F512} verrouiller/d\xE9verrouiller instantan\xE9ment."]},{v:"0.7.0",date:"7 juillet 2026",titre:"La forge : affinage, tiers et nouvelles raret\xE9s",points:["La vente d'\xE9quipement ne rapporte plus d'or mais des \u2692 morceaux de ferraille, la nouvelle monnaie de forge.","Affinage : chaque objet peut \xEAtre affin\xE9 10 fois \xE0 la ferraille (+5% de stats par niveau), puis \xE9voluer en Tier II et III \u2014 jusqu'\xE0 \xD72,5 les stats de base.","\u2726 Essence r\xE9siduelle : l\xE2ch\xE9e par le Gardien de chaque zone (niveau 10/10), une seule fois par run et par zone \u2014 il faut relancer pour en r\xE9colter \xE0 nouveau. Elle paie les \xE9volutions de Tier.","4 nouvelles raret\xE9s : Magique, H\xE9ro\xEFque, Mythique et Divin. Un seul \xE9quipement Divin peut \xEAtre port\xE9\u2026 pour l'instant.","Verrouillage \u{1F512} : un objet verrouill\xE9 ne peut plus \xEAtre vendu, ni \xE0 l'unit\xE9 ni par les ventes de masse.","Clique sur un objet \xE9quip\xE9 pour l'affiner directement. Prochaine \xE9tape : la grande refonte visuelle de l'\xE9quipement (inventaire \xE0 cases, ensembles, priorit\xE9s)."]},{v:"0.6.0",date:"7 juillet 2026",titre:"Le jeu s'adapte \xE0 ton \xE9cran",points:["Mise \xE0 l'\xE9chelle automatique : le jeu d\xE9tecte la taille de ta fen\xEAtre et s'ajuste \u2014 plus de barres de d\xE9filement sur les petits \xE9crans.","Nouvelle section Graphismes dans les Param\xE8tres : si l'automatique ne te convient pas, force l'\xE9chelle \xE0 100 %, 90 %, 80 % ou 70 %, comme dans n'importe quel jeu."]},{v:"0.5.9",date:"7 juillet 2026",titre:"Notifications \xE9largies",points:["La fen\xEAtre Notifications affiche maintenant 5 lignes.","Le reste de l'interface s'est l\xE9g\xE8rement resserr\xE9 pour compenser \u2014 toujours z\xE9ro d\xE9filement, ni sur la page ni sur les jauges."]},{v:"0.5.8",date:"7 juillet 2026",titre:"Notifications \xE0 leur taille",points:["La fen\xEAtre Notifications colle enfin \xE0 son contenu : la liste remplit toute la bo\xEEte, sans grand vide en dessous.","L'espace r\xE9cup\xE9r\xE9 remonte aux jauges m\xE9ta : les 7 jauges tiennent sans d\xE9filement."]},{v:"0.5.7",date:"7 juillet 2026",titre:"Le scroll est mort, pour de bon",points:["La page est d\xE9sormais verrouill\xE9e \xE0 la taille de l'\xE9cran : il est structurellement impossible qu'elle d\xE9file.","Si un onglet a vraiment trop de contenu (gros inventaire\u2026), c'est sa fen\xEAtre int\xE9rieure qui d\xE9file discr\xE8tement, comme dans tout jeu.","En-t\xEAte compact\xE9 et barres l\xE9g\xE8rement affin\xE9es pour que la Boutique tienne sans d\xE9filer du tout."]},{v:"0.5.6",date:"7 juillet 2026",titre:"Contours, cadrage & meilleur \xE9quipement",points:["Tous les textes ont maintenant un contour noir de 1px, fa\xE7on jeu vid\xE9o \u2014 lisibles sur n'importe quel fond.","La sc\xE8ne de combat est recadr\xE9e : h\xE9ros et monstres tiennent enti\xE8rement dans le cadre.","Interface resserr\xE9e : tout tient \xE0 l'\xE9cran sans d\xE9filement.","Nouveau bouton \xAB \u26A1 \xC9quiper le meilleur \xBB (onglet \xC9quipement) : calcule la valeur de chaque objet et \xE9quipe automatiquement la meilleure combinaison, slots jumeaux compris."]},{v:"0.5.5",date:"7 juillet 2026",titre:"Une police qui se lit, enfin",points:["Les textes et les chiffres passent sur une police nette et moderne (Jost) \u2014 la pr\xE9c\xE9dente \xE9tait \xE9l\xE9gante mais illisible sur fond sombre. Les titres gardent leur style FF13.","Les chiffres sur les barres ont maintenant un contour sombre : lisibles quel que soit le remplissage."]},{v:"0.5.4",date:"7 juillet 2026",titre:"Jauges XXL",points:["Les jauges m\xE9ta sont deux fois plus hautes, les chiffres dessus enfin lisibles, et la fen\xEAtre est bien remplie.","Toutes les \xE9critures passent en blanc et en gras \u2014 termin\xE9 le texte fant\xF4me p\xE9nible \xE0 lire."]},{v:"0.5.3",date:"6 juillet 2026",titre:"Alignements au cordeau",points:["Journal de combat et Commandes intervertis : les 4 boutons en colonne \xE0 c\xF4t\xE9 des stats, le journal en pleine largeur en dessous \u2014 et son bas s'aligne avec la fen\xEAtre de gauche.","Plus de trou \xE0 droite : les fen\xEAtres se partagent toute la largeur de l'\xE9cran.","Notifications compact\xE9es : tout tient \xE0 l'\xE9cran, sans d\xE9filement.","Tokens : chiffre et libell\xE9 agrandis, ic\xF4ne align\xE9e."]},{v:"0.5.2",date:"6 juillet 2026",titre:"Fen\xEAtre de notifications & finitions",points:["Les notifications ne flottent plus au milieu de l'\xE9cran : elles ont leur fen\xEAtre d\xE9di\xE9e en bas, sur toute la largeur, avec historique.","Statistiques de combat et Journal de combat : m\xEAme hauteur, plus larges ; la fen\xEAtre Commandes s'\xE9tend sous les deux.","Textes en blanc pur \u2014 le contraste ne pique plus les yeux.","Le compteur de tokens en attente (+x) est enfin lisible."]},{v:"0.5.1",date:"6 juillet 2026",titre:"Lisibilit\xE9 & agencement peaufin\xE9s",points:["Textes nettement plus grands et plus contrast\xE9s \u2014 fini de plisser les yeux.","Plus aucun d\xE9bordement : le jeu tient dans l'\xE9cran, sans barre de d\xE9filement.","Les onglets s'\xE9tendent sur toute la largeur ; statistiques et journal passent juste en dessous.","Nouvelle fen\xEAtre Commandes en bas \xE0 droite : AFK, ZONE, RESET RUN et Param\xE8tres.","Barre du haut r\xE9organis\xE9e : tokens de boss \xE0 gauche, zone au centre, or \xE0 droite \u2014 en plus gros."]},{v:"0.5.0",date:"6 juillet 2026",titre:"Grand \xE9cran & armes de Transcendance",points:["Le jeu occupe enfin tout l'\xE9cran : statistiques de combat et journal de combat ont leurs propres fen\xEAtres, \xE0 droite.","Nouvelle direction artistique des textes \u2014 polices \xE9l\xE9gantes fa\xE7on FF13.","Vente d'\xE9quipement par raret\xE9 (un bouton par raret\xE9, avec compteur).","Recyclage automatique du butin, param\xE9trable par raret\xE9, par type et par niveau \u2014 fini le tri \xE0 la main.","Anneaux et boucles d'oreille : tu choisis maintenant dans quel emplacement les \xE9quiper. Les armes secondaires s'appellent des Lames, et chaque objet affiche son type.","Les Armes de Transcendance ne se ramassent plus : elles se forgent en transcendant une zone. For\xEAt = or, D\xE9sert = attaque, Oc\xE9an = PV. Uniques, indestructibles, elles se renforcent \xE0 chaque transcendance \u2014 la meilleure s'\xE9quipe toute seule, et tu peux choisir la tienne."]},{v:"0.4.1",date:"6 juillet 2026",titre:"La mise \xE0 jour vient \xE0 toi",points:["Au lancement, l'application v\xE9rifie toute seule si une nouvelle version existe et te propose de l'installer \u2014 tu peux toujours refuser et le faire plus tard."]},{v:"0.4.0",date:"6 juillet 2026",titre:"Le jeu apprend \xE0 se mettre \xE0 jour",points:["Le jeu a maintenant un num\xE9ro de version, visible dans les R\xE9glages.","Cette fen\xEAtre de nouveaut\xE9s s'affiche apr\xE8s chaque mise \xE0 jour \u2014 tu ne rateras plus rien.","Dans l'application de bureau, le bouton \xAB Mettre \xE0 jour le jeu \xBB (R\xE9glages) r\xE9cup\xE8re la derni\xE8re version en ligne."]},{v:"0.3.0",date:"juin 2026",titre:"La base du monde",points:["3 zones \xD7 10 niveaux : For\xEAt, D\xE9sert, Oc\xE9an, chacune gard\xE9e par son Gardien.","Bes @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Jost:wght@400;500;600;700&display=swap');
.trx{ --bg:#161b2e; --panel:#1f2540; --panel2:#262d4d; --line:#3a4270; --txt:#ffffff; --dim:#ccd6f4; --leaf:#7ee06e; --gold:#ffd45e; --cyan:#6ad4ff; --violet:#c59bff; --rouge:#ff6b6b;
  background: radial-gradient(1200px 500px at 50% -10%, #2a3358 0%, #161b2e 60%), #161b2e;
  color:var(--txt); font-family:'Jost', 'Segoe UI', sans-serif; font-size:16px; font-weight:500; line-height:1.4;
  height:100vh; overflow:hidden; padding:8px 14px; display:flex; flex-direction:column; gap:8px; width:100%; margin:0 auto; box-sizing:border-box;
  text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 -1px 0 #000, 0 1px 0 #000, -1px 0 0 #000, 1px 0 0 #000; }
.trx *{ box-sizing:border-box; }
.trx b{ font-weight:700; }
.trx button{ font-family:'Cinzel', Georgia, serif; }
.px{ image-rendering:pixelated; display:block; }
.titre{ text-align:center; font-size:18px; letter-spacing:6px; color:var(--leaf); text-shadow:0 0 12px rgba(126,224,110,.35), 2px 2px 0 #0c0f1e; margin:2px 0 0; }
.stitre{ text-align:center; font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
.topbar{ display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; background:var(--panel); border:2px solid var(--line); border-radius:10px; padding:8px 12px; }
.zlabel{ font-size:12px; letter-spacing:2px; text-transform:uppercase; }
.zlabel b{ color:var(--leaf); }
.res{ display:flex; gap:14px; margin-left:auto; align-items:center; font-size:13px; }
.gold{ color:var(--gold); } .tokc{ color:var(--violet); }
.pips{ display:flex; gap:3px; align-items:center; }
.pip{ width:11px; height:11px; border:2px solid var(--line); background:#12162a; border-radius:2px; font-size:8px; line-height:8px; text-align:center; color:var(--dim); }
.pip.ok{ background:var(--leaf); border-color:var(--leaf); color:#0c0f1e; }
.pip.boss.ok{ background:var(--violet); border-color:var(--violet); }
.pip.cur{ animation:pulse 1.1s infinite; border-color:var(--cyan); }
.gear{ background:none; border:none; color:var(--dim); font-size:17px; cursor:pointer; padding:2px 4px; }
.gear:hover{ color:var(--txt); }
.scene{ position:relative; height:218px; border:3px solid var(--line); border-radius:12px; overflow:hidden;
  background:linear-gradient(#2e3a68 0%, #232b52 42%, #1a2138 100%);
  display:flex; align-items:flex-end; justify-content:space-between; padding:0 4%; }
.treeline{ position:absolute; left:-2%; right:-2%; bottom:30px; height:88px; background:#1e3326; opacity:.9;
  clip-path:polygon(0% 100%,0% 55%,4% 30%,8% 58%,12% 22%,17% 60%,21% 35%,26% 65%,30% 18%,35% 58%,40% 38%,45% 66%,50% 25%,55% 60%,60% 30%,65% 64%,70% 20%,75% 58%,80% 36%,85% 62%,90% 26%,95% 58%,100% 40%,100% 100%); }
.treeline.t2{ bottom:26px; height:64px; background:#152619; opacity:1;
  clip-path:polygon(0% 100%,0% 60%,6% 38%,11% 62%,16% 30%,22% 64%,28% 42%,34% 68%,40% 30%,46% 62%,52% 40%,58% 66%,64% 28%,70% 60%,76% 38%,82% 64%,88% 30%,94% 60%,100% 44%,100% 100%); }
.sol{ position:absolute; left:0; right:0; bottom:0; height:32px; background:linear-gradient(#2c4a2e, #1b2c1e); border-top:4px solid #3a6038; }
.lucioles{ position:absolute; inset:0; pointer-events:none; }
.luciole{ position:absolute; top:30%; width:4px; height:4px; background:#ffe9a0; box-shadow:0 0 7px 2px rgba(255,212,94,.55); animation:luciole 8s ease-in-out infinite; }
.combattant{ position:relative; width:min(380px,42%); display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:7px; padding-bottom:40px; z-index:2; height:100%; }
.sprwrap{ filter:drop-shadow(0 6px 0 rgba(0,0,0,.35)); transition:margin .1s; }
.bob{ animation:bob 2.1s ease-in-out infinite; }
.bob2{ animation:bob 2.6s ease-in-out infinite; }
.lunge{ margin-left:30px; }
.flash .px{ filter:brightness(2.6) saturate(.4); }
.plate{ width:100%; background:rgba(12,15,30,.86); border:2px solid var(--line); border-radius:8px; padding:6px 8px; display:flex; flex-direction:column; gap:4px; }
.pname{ font-size:11px; letter-spacing:1px; display:flex; justify-content:space-between; gap:6px; text-transform:uppercase; }
.psub{ font-size:9px; color:var(--dim); }
.vs{ align-self:center; margin-bottom:120px; font-size:20px; opacity:.3; z-index:2; }
.apparait{ color:var(--dim); font-size:12px; padding-bottom:80px; animation:pulse 1.4s infinite; }
.floats{ position:absolute; inset:0; pointer-events:none; z-index:6; }

.trx{ --line:#2f3760; --panel:#1c2340; --panel2:#232a4c; --dim:#b9c4ea; --r1:8px; --r2:12px; --r3:16px; --ombre:0 4px 14px rgba(0,0,0,.35); }
.panneau{ border-width:1px; border-color:#2c3358; border-radius:var(--r3); padding:12px 14px;
  background:linear-gradient(180deg, rgba(35,42,76,.55), rgba(22,27,46,.88)); box-shadow:var(--ombre); }
.carte{ border-width:1px; border-color:#323a68; border-radius:var(--r2); padding:10px 12px; gap:4px;
  background:linear-gradient(180deg, rgba(38,45,77,.85), rgba(30,36,64,.85)); transition:border-color .15s; }
.carte:hover{ border-color:#414b85; }
.topbar{ border-width:1px; border-radius:var(--r3); box-shadow:var(--ombre); padding:7px 14px; }
.tabsbar{ border-width:1px; border-radius:var(--r3); }
.tabbtn{ padding:9px 4px; transition:color .15s, background .15s; }
.tabbtn:hover{ color:var(--txt); background:rgba(255,255,255,.035); }
.eqpanel,.dcase,.icell,.node,.slot,.jauge{ border-width:1px; }
.reschip{ border-width:1px; border-color:#9c7f2c; border-radius:999px; padding:3px 15px; box-shadow:inset 0 0 10px rgba(201,162,39,.10), 0 2px 6px rgba(0,0,0,.3); }
.btn{ border-width:1px; border-radius:var(--r1); background:linear-gradient(180deg, #2a3157, #1f2540); transition:border-color .12s, box-shadow .12s; }
.btn:not(:disabled):hover{ border-color:#5a64a0; }
.btn.on:not(:disabled):hover{ border-color:var(--leaf); }
.btn.ghost{ background:transparent; }
.btn.big{ border-radius:var(--r2); }
.btn.prestige{ font-family:'Cinzel', Georgia, serif; border:1px solid #d4af37; color:#241a04; font-weight:700;
  background:linear-gradient(180deg, #ffe9a8, #d4af37); text-shadow:none; letter-spacing:2px;
  box-shadow:0 0 18px rgba(255,224,138,.35), 0 3px 0 #7a5c14; animation:glowPulse 2.2s ease-in-out infinite; }
.btn.prestige:not(:disabled):hover{ border-color:#fff0c0; }
.btn.prestige:disabled{ animation:none; background:linear-gradient(180deg, #4a4436, #37331f); color:#9a916d; border-color:#5a5230; box-shadow:none; opacity:1; }
.bar{ border-radius:6px; border-width:1px; }
.barfill{ border-radius:5px; }
.ctitel{ border-bottom-color:#2c3358; }
.ctitre{ font-size:15px; }
.niv{ font-size:12px; }
.badge2{ font-family:'Cinzel', Georgia, serif; font-size:10px; letter-spacing:1px; border:1px solid; border-radius:5px; padding:1px 7px; text-transform:uppercase; white-space:nowrap; }
.scene{ border-width:1px; border-color:#3a4270; box-shadow:var(--ombre), inset 0 -18px 30px rgba(0,0,0,.3); }
.plate{ border-width:1px; border-radius:10px; }
.pname{ font-size:13px; }
.float{ font-size:15px; }
.float.crit{ font-size:22px; animation:critPop .9s ease-out forwards; text-shadow:0 0 8px rgba(255,212,94,.85), 1px 1px 0 #000; }
.etatCombat{ position:absolute; top:36px; left:50%; transform:translateX(-50%); z-index:5; font-family:'Cinzel', Georgia, serif; font-size:12px; letter-spacing:2px; color:#fff; background:rgba(8,10,18,.55); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:2px 16px; white-space:nowrap; }
.schip{ border-width:1px; border-radius:var(--r1); padding:4px 10px; font-size:14.5px; }
.pstats .statcol{ display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.pstats .statcol .schip{ font-size:12.5px; display:flex; justify-content:space-between; gap:6px; }
.cmdcol .btn{ padding:8px; }
.loglist{ font-size:13.5px; gap:2px; }
.loglist div{ opacity:.82; }
.loglist .limp{ opacity:1; font-weight:600; }
.toast{ border-width:1px; border-left-width:4px; border-radius:var(--r1); }
.pnotifs{ transition:flex-basis .18s ease; }
.pnotifs.mini{ flex:0 0 44px; }
.pnotifs.mini .notiflist{ overflow:hidden; }
.jauge{ background:linear-gradient(180deg, rgba(38,45,77,.5), rgba(26,31,56,.6)); border:1px solid #2c3358; border-radius:var(--r2); padding:7px 10px 8px; margin-bottom:7px; }
.node{ border-radius:10px; padding:5px 8px; transition:border-color .12s, box-shadow .12s; }
.node .nodedesc{ display:none; }
.node:hover .nodedesc{ display:block; }
.node.dispo:hover{ box-shadow:0 0 12px rgba(139,224,95,.45); }
.node.t3{ border-width:2px; padding:8px 9px; background:linear-gradient(180deg, rgba(60,50,20,.35), rgba(30,36,64,.85)); }
.node.t3 .nodenom{ font-size:13.5px; color:#ffe08a; }
.brtitre{ border:1px solid #2c3358; border-radius:var(--r2); padding:5px 4px 6px; background:rgba(0,0,0,.18); margin-bottom:8px; }
.brprog{ font-family:'Jost', sans-serif; font-size:11.5px; color:var(--dim); font-weight:500; letter-spacing:0; }
.eqbtn{ border-width:1px; padding:9px 8px; font-size:18px; gap:3px; background:linear-gradient(180deg, #262d4d, #1d2340); box-shadow:0 2px 0 #0c0f1e; }
.eqbtn small{ font-size:10.5px; color:var(--dim); }
.eqbtn:hover small{ color:var(--txt); }
.bfiltres{ display:flex; gap:5px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
.bgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(235px, 1fr)); gap:7px; }
.bcard{ display:flex; gap:8px; align-items:center; border:1px solid #323a68; border-radius:var(--r2); background:linear-gradient(180deg, rgba(38,45,77,.7), rgba(28,34,60,.7)); padding:6px 9px; cursor:pointer; transition:border-color .12s; }
.bcard:hover{ border-color:#4a548c; }
.bcard.ouverte{ grid-column:1 / -1; cursor:default; align-items:flex-start; }
.bcard.bmait{ border-color:rgba(126,224,110,.45); }
.binfo{ flex:1; min-width:0; }
.bnom{ font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden; }
.bsous{ font-size:12px; color:var(--dim); display:flex; gap:10px; flex-wrap:wrap; }
.videtat{ text-align:center; color:var(--dim); padding:26px 14px; border:1px dashed #39406a; border-radius:var(--r2); font-size:14.5px; line-height:1.6; }
.modale{ animation:popIn .16s ease-out; border-width:1px; box-shadow:0 10px 40px rgba(0,0,0,.5); }
.voile{ backdrop-filter:blur(2px); }
@keyframes glowPulse{ 0%,100%{ box-shadow:0 0 12px rgba(255,224,138,.25), 0 3px 0 #7a5c14; } 50%{ box-shadow:0 0 26px rgba(255,224,138,.6), 0 3px 0 #7a5c14; } }
@keyframes critPop{ 0%{ transform:scale(.6) translateY(0); opacity:1; } 18%{ transform:scale(1.4) translateY(-6px); } 100%{ transform:scale(1) translateY(-54px); opacity:0; } }
@keyframes popIn{ from{ transform:scale(.94); opacity:0; } to{ transform:scale(1); opacity:1; } }
@media (prefers-reduced-motion: reduce){ .btn.prestige,.float.crit,.modale{ animation:none; } }

/* ============================================================
   v0.9.2 \u2014 \xC9CHELLE, COMPOSITION & CONFORT
   ============================================================ */
.trx{ font-size:17px; }
.ctitre{ font-size:17px; } .ctitre.small{ font-size:15px; }
.cinfo{ font-size:15px; } .note{ font-size:14.5px; padding:7px 11px; }
.statline b{ font-size:16.5px; }
.btn{ padding:9px 14px; font-size:14px; }
.btn.mini{ padding:5px 10px; font-size:12px; }
.btn.big{ padding:13px 16px; font-size:16px; }
.carte{ padding:12px 14px; gap:5px; }
.panneau{ padding:14px 16px; }
.tabbtn{ font-size:16px; padding:11px 4px; }
.reschip{ padding:4px 16px; }
.tbgauche .tbside{ font-size:19px; }
.tbdim{ font-size:15px; }
.zlabel{ font-size:17px; }
.niv{ font-size:12.5px; }
.schip{ font-size:15px; padding:5px 11px; }
.schip b{ font-size:16px; }
.pstats .statcol .schip{ font-size:13px; }
.pstats .statcol .schip b{ font-size:14.5px; }
.jhead{ font-size:19px; }
.jeff{ font-size:15px; }
.badge2{ font-size:11px; padding:2px 8px; }
.invnom{ font-size:16.5px; }
.mtitre{ font-size:22px; }
.mgain,.mstats{ font-size:15.5px; }
/* titres d'\xE9cran par onglet */
.ecrantitre{ display:flex; align-items:baseline; gap:12px; border-bottom:1px solid #2c3358; padding-bottom:8px; margin-bottom:12px; }
.ecrantitre h2{ font-family:'Cinzel', Georgia, serif; font-size:20px; margin:0; letter-spacing:1.5px; }
.ecrantitre .sous{ font-size:13.5px; color:var(--dim); }
/* sc\xE8ne : composition centre */
.centreCombat{ position:absolute; top:34px; left:50%; transform:translateX(-50%); z-index:5; display:flex; flex-direction:column; align-items:center; gap:4px; }
.etatCombat{ position:static; transform:none; }
.etatSous{ font-size:12.5px; color:#fff; opacity:.75; background:rgba(8,10,18,.45); border-radius:999px; padding:1px 12px; }
/* \xE9quipement : plus grand, plus RPG */
.dcase{ width:96px; padding:9px 5px 5px; }
.dnom{ font-size:10px; margin-top:5px; }
.dtier{ font-size:11px; }
.invgrid{ grid-template-columns:repeat(auto-fill, minmax(66px, 1fr)); gap:7px; }
.eqdoll .dollmid{ flex:0 1 300px; }
/* jauges boutique sur 2 colonnes */
.jlist{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.jlist .jauge{ margin-bottom:0; }
@media (max-width:1500px){ .jlist{ grid-template-columns:1fr; } }
/* arbre : nodes compacts + panneau d\xE9tail */
.node{ display:flex; align-items:center; gap:7px; padding:6px 8px; }
.node .nodedesc{ display:none !important; }
.nodenom{ flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nodebas{ margin-top:0; white-space:nowrap; font-size:11.5px; }
.node .nrang{ flex:0 0 auto; width:26px; height:26px; border-radius:50%; border:2px solid #39406a; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; background:rgba(0,0,0,.3); }
.node.maxed .nrang{ border-color:#ffe08a; color:#ffe08a; }
.node.dispo .nrang{ border-color:#8be05f; }
.node.selnode{ outline:2px solid var(--cyan); }
.nodedetail{ border:1px solid #c9a22755; border-radius:var(--r2); background:linear-gradient(180deg, rgba(60,50,20,.25), rgba(22,27,46,.8)); padding:10px 14px; margin-bottom:10px; display:flex; flex-wrap:wrap; gap:6px 16px; align-items:center; }
/* rail contextuelle */
.pctx{ grid-column:1 / -1; }
.ctxrow{ display:flex; justify-content:space-between; gap:8px; font-size:14px; padding:3px 0; border-bottom:1px dashed #2c3358; }
.ctxrow:last-child{ border-bottom:none; }
/* toasts flottants */
.toastsFlot{ position:fixed; top:64px; right:16px; z-index:75; display:flex; flex-direction:column; gap:6px; width:min(360px, 90vw); pointer-events:none; }
.toastsFlot .toast{ box-shadow:0 6px 18px rgba(0,0,0,.45); background:rgba(15,19,38,.97); }
/* bouton + tiroir notifications */
.notifbtn{ position:fixed; right:16px; bottom:12px; z-index:56; }
.notifdrawer{ position:fixed; right:16px; bottom:58px; z-index:56; width:min(460px, 92vw); max-height:46vh; overflow-y:auto; background:rgba(18,22,42,.98); border:1px solid #39406a; border-radius:var(--r2); box-shadow:0 12px 40px rgba(0,0,0,.55); padding:10px 12px; display:flex; flex-direction:column; gap:5px; animation:popIn .14s ease-out; }
/* zones alt\xE9r\xE9es : ambiance corrompue */
.carteAlt{ background:linear-gradient(180deg, rgba(38,24,66,.85), rgba(16,10,34,.9)) !important; }
.zoneDroite{ grid-template-rows:auto auto minmax(0,1fr); }

/* ============================================================
   v0.9.3 \u2014 GAME FEEL : toast lane, th\xE9\xE2tre, loot, arbre, guidance
   ============================================================ */
.toastsFlot{ top:auto; bottom:62px; right:16px; flex-direction:column; justify-content:flex-end; }
.toastsFlot .toast{ animation:toastSlide .22s ease-out; }
@keyframes toastSlide{ from{ transform:translateX(26px); opacity:0; } to{ transform:none; opacity:1; } }
.notifbtn.alerte{ border-color:var(--gold); color:var(--gold); box-shadow:0 0 10px rgba(255,212,94,.35); }
.etatCombat.urgent{ animation:pulse 1.1s infinite; }
.scene.sgardien{ box-shadow:var(--ombre), inset 0 0 46px rgba(255,212,94,.16); }
.icell{ transition:outline-color .15s; }
.icell.neuf{ animation:neufGlow 1.1s ease-in-out infinite; }
@keyframes neufGlow{ 0%,100%{ outline:2px solid rgba(255,224,138,.12); } 50%{ outline:2px solid rgba(255,224,138,.85); } }
.iup{ position:absolute; top:-1px; left:3px; color:#8be05f; font-size:13px; font-weight:900; text-shadow:0 0 4px #000, 0 0 8px rgba(139,224,95,.6); }
.objrow{ display:flex; gap:7px; align-items:flex-start; font-size:13.5px; padding:3px 0; line-height:1.3; }
.arbretronc{ margin-bottom:14px; }
.brtitre{ cursor:pointer; position:relative; transition:opacity .15s; }
.brtitre::before{ content:""; position:absolute; top:-13px; left:50%; width:2px; height:12px; background:linear-gradient(#c9a227aa, transparent); }
.branche.dimmed{ opacity:.38; filter:saturate(.5); }
.gainxxl{ font-family:'Cinzel', Georgia, serif; font-size:40px; line-height:1.1; color:#ffe08a; text-align:center; text-shadow:0 0 20px rgba(255,224,138,.55), 2px 2px 0 #000; letter-spacing:2px; }
.bdet{ display:flex; gap:10px; align-items:flex-start; margin-top:8px; border-top:1px dashed #2c3358; padding-top:8px; }
.eqdetail .ctitre{ font-size:18px; }
