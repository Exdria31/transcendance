\xE0 cases : chaque objet dans sa case color\xE9e par raret\xE9, badges de tier et de verrou, survol pour les stats.","Tri automatique (raret\xE9 puis tier puis niveau) et filtres par type d'\xE9quipement (armes, anneaux, boucles\u2026).","Ensembles d'\xE9quipement : sauvegarde ta panoplie actuelle, r\xE9\xE9quipe-la en un clic, renomme-la, range-la dans des groupes. Les pi\xE8ces li\xE9es \xE0 un ensemble sont automatiquement \u{1F517} verrouill\xE9es.","\xAB \xC9quiper le meilleur \xBB configurable : construis ton ordre de priorit\xE9 (Or \u2192 Attaque \u2192 PV\u2026), et sauvegarde-le en profils r\xE9utilisables."]},{v:"0.7.1",date:"7 juillet 2026",titre:"Finitions de forge",points:["L'essence r\xE9siduelle brille d\xE9sormais en rouge rubis, et son nom complet s'affiche dans le bandeau.","Les ressources du bandeau sont encadr\xE9es d'un liser\xE9 dor\xE9 \u2014 chaque monnaie a son \xE9crin.","Clic droit sur un objet (inventaire ou \xE9quip\xE9) pour le \u{1F512} verrouiller/d\xE9verrouiller instantan\xE9ment."]},{v:"0.7.0",date:"7 juillet 2026",titre:"La forge : affinage, tiers et nouvelles raret\xE9s",points:["La vente d'\xE9quipement ne rapporte plus d'or mais des \u2692 morceaux de ferraille, la nouvelle monnaie de forge.","Affinage : chaque objet peut \xEAtre affin\xE9 10 fois \xE0 la ferraille (+5% de stats par niveau), puis \xE9voluer en Tier II et III \u2014 jusqu'\xE0 \xD72,5 les stats de base.","\u2726 Essence r\xE9siduelle : l\xE2ch\xE9e par le Gardien de chaque zone (niveau 10/10), une seule fois par run et par zone \u2014 il faut relancer pour en r\xE9colter \xE0 nouveau. Elle paie les \xE9volutions de Tier.","4 nouvelles raret\xE9s : Magique, H\xE9ro\xEFque, Mythique et Divin. Un seul \xE9quipement Divin peut \xEAtre port\xE9\u2026 pour l'instant.","Verrouillage \u{1F512} : un objet verrouill\xE9 ne peut plus \xEAtre vendu, ni \xE0 l'unit\xE9 ni par les ventes de masse.","Clique sur un objet \xE9quip\xE9 pour l'affiner directement. Prochaine \xE9tape : la grande refonte visuelle de l'\xE9quipement (inventaire \xE0 cases, ensembles, priorit\xE9s)."]},{v:"0.6.0",date:"7 juillet 2026",titre:"Le jeu s'adapte \xE0 ton \xE9cran",points:["Mise \xE0 l'\xE9chelle automatique : le jeu d\xE9tecte la taille de ta fen\xEAtre et s'ajuste \u2014 plus de barres de d\xE9filement sur les petits \xE9crans.","Nouvelle section Graphismes dans les Param\xE8tres : si l'automatique ne te convient pas, force l'\xE9chelle \xE0 100 %, 90 %, 80 % ou 70 %, comme dans n'importe quel jeu."]},{v:"0.5.9",date:"7 juillet 2026",titre:"Notifications \xE9largies",points:["La fen\xEAtre Notifications affiche maintenant 5 lignes.","Le reste de l'interface s'est l\xE9g\xE8rement resserr\xE9 pour compenser \u2014 toujours z\xE9ro d\xE9filement, ni sur la page ni sur les jauges."]},{v:"0.5.8",date:"7 juillet 2026",titre:"Notifications \xE0 leur taille",points:["La fen\xEAtre Notifications colle enfin \xE0 son contenu : la liste remplit toute la bo\xEEte, sans grand vide en dessous.","L'espace r\xE9cup\xE9r\xE9 remonte aux jauges m\xE9ta : les 7 jauges tiennent sans d\xE9filement."]},{v:"0.5.7",date:"7 juillet 2026",titre:"Le scroll est mort, pour de bon",points:["La page est d\xE9sormais verrouill\xE9e \xE0 la taille de l'\xE9cran : il est structurellement impossible qu'elle d\xE9file.","Si un onglet a vraiment trop de contenu (gros inventaire\u2026), c'est sa fen\xEAtre int\xE9rieure qui d\xE9file discr\xE8tement, comme dans tout jeu.","En-t\xEAte compact\xE9 et barres l\xE9g\xE8rement affin\xE9es pour que la Boutique tienne sans d\xE9filer du tout."]},{v:"0.5.6",date:"7 juillet 2026",titre:"Contours, cadrage & meilleur \xE9quipement",points:["Tous les textes ont maintenant un contour noir de 1px, fa\xE7on jeu vid\xE9o \u2014 lisibles sur n'importe quel fond.","La sc\xE8ne de combat est recadr\xE9e : h\xE9ros et monstres tiennent enti\xE8rement dans le cadre.","Interface resserr\xE9e : tout tient \xE0 l'\xE9cran sans d\xE9filement.","Nouveau bouton \xAB \u26A1 \xC9quiper le meilleur \xBB (onglet \xC9quipement) : calcule la valeur de chaque objet et \xE9quipe automatiquement la meilleure combinaison, slots jumeaux compris."]},{v:"0.5.5",date:"7 juillet 2026",titre:"Une police qui se lit, enfin",points:["Les textes et les chiffres passent sur une police nette et moderne (Jost) \u2014 la pr\xE9c\xE9dente \xE9tait \xE9l\xE9gante mais illisible sur fond sombre. Les titres gardent leur style FF13.","Les chiffres sur les barres ont maintenant un contour sombre : lisibles quel que soit le remplissage."]},{v:"0.5.4",date:"7 juillet 2026",titre:"Jauges XXL",points:["Les jauges m\xE9ta sont deux fois plus hautes, les chiffres dessus enfin lisibles, et la fen\xEAtre est bien remplie.","Toutes les \xE9critures passent en blanc et en gras \u2014 termin\xE9 le texte fant\xF4me p\xE9nible \xE0 lire."]},{v:"0.5.3",date:"6 juillet 2026",titre:"Alignements au cordeau",points:["Journal de combat et Commandes intervertis : les 4 boutons en colonne \xE0 c\xF4t\xE9 des stats, le journal en pleine largeur en dessous \u2014 et son bas s'aligne avec la fen\xEAtre de gauche.","Plus de trou \xE0 droite : les fen\xEAtres se partagent toute la largeur de l'\xE9cran.","Notifications compact\xE9es : tout tient \xE0 l'\xE9cran, sans d\xE9filement.","Tokens : chiffre et libell\xE9 agrandis, ic\xF4ne align\xE9e."]},{v:"0.5.2",date:"6 juillet 2026",titre:"Fen\xEAtre de notifications & finitions",points:["Les notifications ne flottent plus au milieu de l'\xE9cran : elles ont leur fen\xEAtre d\xE9di\xE9e en bas, sur toute la largeur, avec historique.","Statistiques de combat et Journal de combat : m\xEAme hauteur, plus larges ; la fen\xEAtre Commandes s'\xE9tend sous les deux.","Textes en blanc pur \u2014 le contraste ne pique plus les yeux.","Le compteur de tokens en attente (+x) est enfin lisible."]},{v:"0.5.1",date:"6 juillet 2026",titre:"Lisibilit\xE9 & agencement peaufin\xE9s",points:["Textes nettement plus grands et plus contrast\xE9s \u2014 fini de plisser les yeux.","Plus aucun d\xE9bordement : le jeu tient dans l'\xE9cran, sans barre de d\xE9filement.","Les onglets s'\xE9tendent sur toute la largeur ; statistiques et journal passent juste en dessous.","Nouvelle fen\xEAtre Commandes en bas \xE0 droite : AFK, ZONE, RESET RUN et Param\xE8tres.","Barre du haut r\xE9organis\xE9e : tokens de boss \xE0 gauche, zone au centre, or \xE0 droite \u2014 en plus gros."]},{v:"0.5.0",date:"6 juillet 2026",titre:"Grand \xE9cran & armes de Transcendance",points:["Le jeu occupe enfin tout l'\xE9cran : statistiques de combat et journal de combat ont leurs propres fen\xEAtres, \xE0 droite.","Nouvelle direction artistique des textes \u2014 polices \xE9l\xE9gantes fa\xE7on FF13.","Vente d'\xE9quipement par raret\xE9 (un bouton par raret\xE9, avec compteur).","Recyclage automatique du butin, param\xE9trable par raret\xE9, par type et par niveau \u2014 fini le tri \xE0 la main.","Anneaux et boucles d'oreille : tu choisis maintenant dans quel emplacement les \xE9quiper. Les armes secondaires s'appellent des Lames, et chaque objet affiche son type.","Les Armes de Transcendance ne se ramassent plus : elles se forgent en transcendant une zone. For\xEAt = or, D\xE9sert = attaque, Oc\xE9an = PV. Uniques, indestructibles, elles se renforcent \xE0 chaque transcendance \u2014 la meilleure s'\xE9quipe toute seule, et tu peux choisir la tienne."]},{v:"0.4.1",date:"6 juillet 2026",titre:"La mise \xE0 jour vient \xE0 toi",points:["Au lancement, l'application v\xE9rifie toute seule si une nouvelle version existe et te propose de l'installer \u2014 tu peux toujours refuser et le faire plus tard."]},{v:"0.4.0",date:"6 juillet 2026",titre:"Le jeu apprend \xE0 se mettre \xE0 jour",points:["Le jeu a maintenant un num\xE9ro de version, visible dans les R\xE9glages.","Cette fen\xEAtre de nouveaut\xE9s s'affiche apr\xE8s chaque mise \xE0 jour \u2014 tu ne rateras plus rien.","Dans l'application de bureau, le bouton \xAB Mettre \xE0 jour le jeu \xBB (R\xE9glages) r\xE9cup\xE8re la derni\xE8re version en ligne."]},{v:"0.3.0",date:"juin 2026",titre:"La base du monde",points:["3 zones \xD7 10 niveaux : For\xEAt, D\xE9sert, Oc\xE9an, chacune gard\xE9e par son Gardien.","Bestiaire, stances, \xE9quipement persistant et jauges de transcendance."]}];function Ls(e,n){let t=String(e||"0").split("."),r=String(n||"0").split(".");for(let o=0;o<3;o++){let l=(parseInt(t[o],10)||0)-(parseInt(r[o],10)||0);if(l)return l}return 0}var T={hero:{atk:10,hp:100,as:1,critC:5,critD:150},mob:{hp:30,hpG:1.36,atk:3.2,atkG:1.27,gold:7,goldG:1.31,as:.8},boss:{hp:5,atk:1.5,gold:8,as:.62},zbos:{hp:10,atk:1.7,gold:20,as:.55},shop:{atkC:12,atkCG:1.18,atkV:5,hpC:15,hpCG:1.2,hpV:5,heal:.3},drop:{normal:.05,mini:.45,zone:1,tw_mini:.1,tw_zone:.35},defK:150,spawn:.7,healKill:.02,bestDmg:3,bestRes:3,bestGold:2,transReq:2.5},un=Math.random,Is=(e,n,t)=>Math.max(n,Math.min(t,e)),jp=["","k","M","B","T","q","Q"];function O(e){if(!isFinite(e))return"\u221E";if(e<0)return"-"+O(-e);if(e<1e3)return e<10&&e%1!==0?e.toFixed(1).replace(".",","):String(Math.floor(e));let n=0;for(;e>=1e3&&n<jp.length-1;)e/=1e3,n++;return(e>=100?Math.floor(e):e.toFixed(1).replace(".",","))+" "+jp[n]}var Pk=["c","a","o","p"],Tk=["","","\xB2","\xB3","\u2074","\u2075","\u2076","\u2077","\u2078","\u2079"];function cn(e){if(e=Math.floor(Math.max(0,e)),e<100)return e+"c";let n=0,t=e;for(;t>=100;)t=Math.floor(t/100),n++;let r=a=>Pk[a%4]+(a>=4?Tk[Math.floor(a/4)+1]:""),o=Math.pow(100,n),l=Math.floor(e/o),i=Math.floor(e%o/(o/100));return l+r(n)+(i>0?" "+i+r(n-1):"")}var Pp=e=>(e>0?"+":"")+(Math.round(e*10)/10).toString().replace(".",",")+"%",Hp=1,Gn=()=>Hp++,x={k:"#241b2f",w:"#f6f2ff",W:"#d9d2ef",g1:"#8be05f",g2:"#5cb84a",g3:"#3d8a3a",g4:"#2a6330",r1:"#ff6b6b",r2:"#d94a5a",cr:"#ffe9c9",b1:"#6ad4ff",b2:"#3d9be0",y1:"#ffd45e",y2:"#e0a63d",y3:"#a8762a",p1:"#c59bff",p2:"#9a6ae0",p3:"#6b46a8",n1:"#c9a06a",n2:"#9a7448",n3:"#6e4f2f",n4:"#4a3420",s1:"#b9c2d9",s2:"#8a93b3",s3:"#5d6485",o1:"#ff9 @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Jost:wght@400;500;600;700&display=swap');
.trx{ --bg:#161b2e; --panel:#1f2540; --panel2:#262d4d; --line:#3a4270; --txt:#ffffff; --dim:#ccd6f4; --leaf:#7ee06e; --gold:#ffd45e; --cyan:#6ad4ff; --violet:#c59bff; --rouge:#ff6b6b;
  background: radial-gradient(1200px 500px at 50% -10%, #2a3358 0%, #161b2e 60%), #161b2e;
  color:var(--txt); font-family:'Jost', 'Segoe UI', sans-serif; font-size:16px; font-weight:500; line-height:1.4;
  height:100vh; overflow:hidden; padding:8px 14px; display:flex; flex-direction:column; gap:8px; width:100%; margin:0 auto; box-sizing:border-box;
  text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 -1px 0 #000, 0 1px 0 #000, -1px 0 0 #000, 1px 0 0 #000; }
.trx *{ box-sizing:border-box; }
.trx b{ font-weight:700; }
.trx button{ font-family:'Cinzel', Georgia, serif; }
.px{ image-rendering:pixelated; display:block; }
.titre{ text-align:center; font-size:18px; letter-spacing:6px; color:var(--leaf); text-shadow:0 0 12px rgba(126,224,110,.35), 2px 2px 0 #0c0f1e; margin:2px 0 0; }
.stitre{ text-align:center; font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
.topbar{ display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; background:var(--panel); border:2px solid var(--line); border-radius:10px; padding:8px 12px; }
.zlabel{ font-size:12px; letter-spacing:2px; text-transform:uppercase; }
.zlabel b{ color:var(--leaf); }
.res{ display:flex; gap:14px; margin-left:auto; align-items:center; font-size:13px; }
.gold{ color:var(--gold); } .tokc{ color:var(--violet); }
.pips{ display:flex; gap:3px; align-items:center; }
.pip{ width:11px; height:11px; border:2px solid var(--line); background:#12162a; border-radius:2px; font-size:8px; line-height:8px; text-align:center; color:var(--dim); }
.pip.ok{ background:var(--leaf); border-color:var(--leaf); color:#0c0f1e; }
.pip.boss.ok{ background:var(--violet); border-color:var(--violet); }
.pip.cur{ animation:pulse 1.1s infinite; border-color:var(--cyan); }
.gear{ background:none; border:none; color:var(--dim); font-size:17px; cursor:pointer; padding:2px 4px; }
.gear:hover{ color:var(--txt); }
.scene{ position:relative; height:218px; border:3px solid var(--line); border-radius:12px; overflow:hidden;
  background:linear-gradient(#2e3a68 0%, #232b52 42%, #1a2138 100%);
  display:flex; align-items:flex-end; justify-content:space-between; padding:0 4%; }
.treeline{ position:absolute; left:-2%; right:-2%; bottom:30px; height:88px; background:#1e3326; opacity:.9;
  clip-path:polygon(0% 100%,0% 55%,4% 30%,8% 58%,12% 22%,17% 60%,21% 35%,26% 65%,30% 18%,35% 58%,40% 38%,45% 66%,50% 25%,55% 60%,60% 30%,65% 64%,70% 20%,75% 58%,80% 36%,85% 62%,90% 26%,95% 58%,100% 40%,100% 100%); }
.treeline.t2{ bottom:26px; height:64px; background:#152619; opacity:1;
  clip-path:polygon(0% 100%,0% 60%,6% 38%,11% 62%,16% 30%,22% 64%,28% 42%,34% 68%,40% 30%,46% 62%,52% 40%,58% 66%,64% 28%,70% 60%,76% 38%,82% 64%,88% 30%,94% 60%,100% 44%,100% 100%); }
.sol{ position:absolute; left:0; right:0; bottom:0; height:32px; background:linear-gradient(#2c4a2e, #1b2c1e); border-top:4px solid #3a6038; }
.lucioles{ position:absolute; inset:0; pointer-events:none; }
.luciole{ position:absolute; top:30%; width:4px; height:4px; background:#ffe9a0; box-shadow:0 0 7px 2px rgba(255,212,94,.55); animation:luciole 8s ease-in-out infinite; }
.combattant{ position:relative; width:min(380px,42%); display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:7px; padding-bottom:40px; z-index:2; height:100%; }
.sprwrap{ filter:drop-shadow(0 6px 0 rgba(0,0,0,.35)); transition:margin .1s; }
.bob{ animation:bob 2.1s ease-in-out infinite; }
.bob2{ animation:bob 2.6s ease-in-out infinite; }
.lunge{ margin-left:30px; }
.flash .px{ filter:brightness(2.6) saturate(.4); }
.plate{ width:100%; background:rgba(12,15,30,.86); border:2px solid var(--line); border-radius:8px; padding:6px 8px; display:flex; flex-direction:column; gap:4px; }
.pname{ font-size:11px; letter-spacing:1px; display:flex; justify-content:space-between; gap:6px; text-transform:uppercase; }
.psub{ font-size:9px; color:var(--dim); }
.vs{ align-self:center; margin-bottom:120px; font-size:20px; opacity:.3; z-index:2; }
.apparait{ color:var(--dim); font-size:12px; padding-bottom:80px; animation:pulse 1.4s infinite; }
.floats{ position:absolute; inset:0; pointer-events:none; z-index:6; }
.float{ position:absolute; top:34%; font-weight:bold; font-size:13px; text-shadow:1px 1px 0 #000; animation:floatUp .9s ease-out forwards; white-space:nowrap; }
.float.dmg{ color:#fff; } .float.crit{ color:var(--gold); font-size:17px; }
.float.gold{ color:var(--gold); font-size:11px; top:48%; }
.float.hurt{ color:var(--rouge); } .float.token{ color:var(--violet); font-size:15px; top:26%; }
.bar{ position:relative; background:#10142a; border:2px solid #0b0e1e; border-radius:3px; overflow:hidden; width:100%; }
.barfill{ height:100%; transition:width .12s linear; }
.bartxt{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; letter-spacing:.5px; text-shadow:1px 1px 0 #000; color:#fff; }
.statsrow{ display:flex; flex-wrap:wrap; gap:6px; }
.schip{ background:var(--panel); border:2px solid var(--line); border-radius:6px; padding:3px 8px; font-size:11px; color:var(--dim); }
.schip b{ color:var(--txt); }
.chips{ display:flex; gap:6px; overflow-x:auto; padding:2px; }
.chip{ flex:0 0 auto; background:var(--panel2); border:2px solid var(--line); border-radius:8px; padding:5px 10px; font-size:11px; color:var(--txt); cursor:pointer; box-shadow:0 3px 0 #0c0f1e; }
.chip:active{ transform:translateY(2px); box-shadow:none; }
.chip.on{ box-shadow:0 0 10px rgba(126,224,110,.25), 0 3px 0 #0c0f1e; }
.tabsbar{ display:flex; border:2px solid var(--line); border-radius:10px; overflow:hidden; background:var(--panel); }
.tabbtn{ flex:1; background:none; border:none; border-bottom:3px solid transparent; color:var(--dim); padding:9px 4px; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; position:relative; }
.tabbtn.on{ color:var(--leaf); border-bottom-color:var(--leaf); background:var(--panel2); }
.tabbtn .bulle{ position:absolute; top:4px; right:8px; width:8px; height:8px; background:var(--gold); border-radius:50%; animation:pulse 1s infinite; }
.panneau{ background:var(--panel); border:2px solid var(--line); border-radius:10px; padding:12px; min-height:240px; }
.note{ font-size:11px; color:var(--dim); background:rgba(0,0,0,.22); border-left:3px solid var(--line); border-radius:4px; padding:7px 9px; margin:0 0 10px; }
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:680px){ .grid2{ grid-template-columns:1fr; } .combattant{ width:46%; } }
.carte{ background:var(--panel2); border:2px solid #39406a; border-radius:10px; padding:10px; display:flex; flex-direction:column; gap:5px; }
.carte.active{ box-shadow:0 0 12px rgba(126,224,110,.18); }
.ctitre{ display:flex; align-items:center; gap:6px; font-size:13px; letter-spacing:.5px; }
.ctitre.small{ font-size:12px; }
.niv{ margin-left:auto; font-size:10px; color:var(--dim); letter-spacing:.5px; }
.badge{ margin-left:6px; font-size:9px; letter-spacing:1px; }
.cinfo{ font-size:11px; }
.cinfo.it{ font-style:italic; }
.cinfo.sub{ font-size:11px; }
.dim{ color:var(--dim); }
.crow{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.btn{ background:var(--panel); border:2px solid var(--line); border-radius:7px; color:var(--txt); padding:6px 10px; font-size:11px; letter-spacing:.5px; cursor:pointer; box-shadow:0 3px 0 #0c0f1e; text-transform:uppercase; }
.btn:not(:disabled):active{ transform:translateY(2px); box-shadow:none; }
.btn:disabled{ opacity:.38; cursor:default; }
.btn.on{ border-color:var(--leaf); color:var(--leaf); }
.btn.ghost{ background:transparent; }
.btn.evo{ border-color:var(--violet); color:var(--violet); }
.btn.danger{ border-color:var(--rouge); color:var(--rouge); }
.btn.big{ padding:10px; font-size:13px; margin-top:8px; border-color:var(--leaf); color:var(--leaf); }
.tokrow{ font-size:13px; margin-bottom:6px; }
.tok{ color:var(--violet); font-weight:bold; }
.pend{ color:var(--gold); font-size:10px; animation:pulse 1.2s infinite; margin-left:6px; }
.jauge{ margin-bottom:12px; }
.jhead{ display:flex; align-items:baseline; gap:8px; font-size:12px; margin-bottom:3px; flex-wrap:wrap; }
.jico{ font-size:14px; } .jnom{ letter-spacing:1px; text-transform:uppercase; }
.jsrc{ color:var(--dim); font-size:10px; } .jpal{ margin-left:auto; font-size:11px; }
.jeff{ font-size:10px; color:var(--dim); margin-top:3px; }
.paperdoll{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; margin-bottom:10px; }
.slot{ display:flex; gap:8px; align-items:center; background:var(--panel2); border:2px solid #39406a; border-radius:8px; padding:6px 8px; }
.slot.locked{ opacity:.55; }
.slotnom{ font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.slotit{ font-size:11px; } .slotvide{ font-size:10px; color:var(--dim); font-style:italic; }
.invhead{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin:8px 0; font-size:12px; flex-wrap:wrap; }
.invlist{ display:flex; flex-direction:column; }
.invrow{ display:flex; gap:8px; align-items:center; padding:6px 6px; border-bottom:1px solid #2c335a; cursor:pointer; flex-wrap:wrap; }
.invrow:hover{ background:rgba(255,255,255,.04); }
.invrow.selrow{ outline:2px solid var(--cyan); border-radius:6px; }
.invnom{ font-size:12px; }
.invstats{ font-size:10px; flex-basis:100%; padding-left:28px; }
.detail{ margin-bottom:10px; }
.statline{ display:flex; justify-content:space-between; }
.diff.up{ color:var(--leaf); } .diff.down{ color:var(--rouge); } .diff.eq{ color:var(--dim); }
.bestrow{ display:flex; gap:10px; align-items:center; }
.tierpips{ display:flex; gap:3px; margin:3px 0; }
.tp{ width:9px; height:9px; border:2px solid var(--line); background:#12162a; border-radius:2px; }
.tp.on{ background:var(--leaf); border-color:var(--leaf); }
.voile{ position:fixed; inset:0; background:rgba(8,10,22,.82); display:flex; align-items:center; justify-content:center; z-index:60; padding:14px; }
.modale{ width:min(540px,94vw); max-height:88vh; overflow:auto; background:var(--panel); border:3px solid var(--line); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:7px; }
.mtitre{ font-size:20px; letter-spacing:4px; text-align:center; text-shadow:2px 2px 0 #0c0f1e; }
.mstats{ display:grid; grid-template-columns:1fr 1fr; gap:5px; font-size:12px; }
